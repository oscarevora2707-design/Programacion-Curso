<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestor de Tareas en Memoria</title>
    <link rel="stylesheet" href="/arreglo/disenoarreglo.css">
</head>
<body>
    <main>
        <h1>Mi Panel de Tareas</h1> 
        
        <!-- Sección de CREAR (Formulario) -->
        <form id="form-tarea">
            <input type="text" id="txt-nueva-tarea" placeholder="Escribe una nueva tarea..." required>
            <button type="submit">Agregar Tarea</button>
        </form>

        <!-- Sección de LEER (Lista vacía donde JS meterá los datos) -->
        <ul id="lista-html"></ul>
    </main>

    <script src="/arreglo/arreglos.js"></script>
</body>
</html>
