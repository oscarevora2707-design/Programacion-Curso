<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <link rel="stylesheet" href="/registro/css/registrate.css">
</head>
<body>
    <main>
        <section>
            <header>
                <h1>Iniciar Sesión Aqui</h1>
            </header>
            <form action="index.html">
            <div>
                <label for="txt-name">Nombre Completo:</label>
                <input type="text" id="txt-name" name="name" required placeholder="Ingrese su nombre completo">
            </div>
            <div>
                <label for="txt-email">Correo Electrónico:</label>
                <input type="email" id="txt-email" name="email" required placeholder="Ingrese su correo electrónico">
            </div>

            <div>
                <label for="txt-password">Contraseña:</label>
                <input type="password" id="txt-password" name="password" required minlength="8">
            </div>
            <button type="submit">Registrate</button>
            </form>
        </section>
    </main>
</body>
</html>
