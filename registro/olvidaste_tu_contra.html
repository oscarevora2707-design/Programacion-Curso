<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/registro/css/olvidaste.css">
</head>
<body>
    <main>
        <section>
            <header>
                <h1>Ingrese su nueva Contraseña</h1>
            </header>
            <form action="index.html">
                <div>
                    <label for="txt-password">Nueva Contraseña:</label>
                    <input type="password" id="txt-password" name="password" required minlength="8">
                </div>

                <div>
                    <label for="txt-confirm-password">Confirmar Contraseña:</label>
                    <input type="password" id="txt-confirm-password" name="confirm_password" required minlength="8">
                </div>

                <div>
                    <button type="submit">Submit</button>
                </div>
            </form>
        </section>
    </main>
</body>
</html>
