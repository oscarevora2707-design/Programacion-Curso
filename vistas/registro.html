<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <main>
        <section>   
            <header>
                <h1>Registro de Usuarios</h1>
                <p>Por favor, complete el siguiente formulario para registrarse.</p>
            </header>
            <form action="#">
                <div>
                    <label for="txt-nombre">Nombre Completo:</label>
                    <input type="text" id="txt-nombre" name="nombre" required placeholder="Ingrese su nombre">
                </div>
                <br>
                 <div>
                    <label for="txt-email">Correo Electronico:</label>
                    <input type="email" id="txt-email" name="email" required placeholder="ejemplo@correo.com">
                </div>
                <br>
                <div>
                    <label for="txt-password">Contraseña:</label>
                    <input type="password" id="txt-password" name="password" required minlength="8">
                </div>
                <br>
                <div>
                    <label for="txt-genero">Genero:</label>
                    <input type="radio" id="genero-masculino" name="genero" value="masculino" required>
                    <label for="genero-masculino">Masculino</label>
                    <input type="radio" id="genero-femenino" name="genero" value="femenino" required>
                    <label for="genero-femenino">Femenino</label>
                </div>

                <button type="submit">Enviar</button>
            </form>

        </section>
    </main>
</body>
</html>
